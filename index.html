<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OFFLINE</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- Background -->

<div class="background"></div>

<!-- Opening -->

<section id="opening" class="screen active">

    <div class="container">

        <h1 class="logo">
            OFFLINE
        </h1>

        <p class="subtitle">
            Are you ready to play the game?
        </p>

        <button id="initializeBtn">
            INITIALIZE
        </button>

    </div>

</section>

<!-- Loading -->

<section id="loading" class="screen">

    <div class="container">

        <h2>
            SYSTEM LOADING
        </h2>

        <div class="loading-bar">

            <div id="progress"></div>

        </div>

        <p id="loadingText">
            0%
        </p>

    </div>

</section>

<!-- Unit -->

<section id="unit" class="screen">

    <div class="container">

        <h2>
            Select Your Unit
        </h2>

        <button class="unit-btn" data-unit="STRATEVADE">
            STRATEVADE
        </button>

        <button class="unit-btn" data-unit="EX-SCRUTE">
            EX-SCRUTE
        </button>

    </div>

</section>

<!-- Registration -->

<section id="register" class="screen">

    <div class="container">

        <h2>
            Player Registration
        </h2>

        <input
        id="playerName"
        type="text"
        placeholder="Player Name">

        <input
        id="playerPort"
        type="text"
        placeholder="Player Port">

        <button id="continueBtn">
            CONTINUE
        </button>

    </div>

</section>

<!-- Menu -->

<section id="menu" class="screen">

<div class="container">

<h2>
Village Terminal
</h2>

<div class="profile">

<p>

<strong>Name:</strong>

<span id="displayName"></span>

</p>

<p>

<strong>Port:</strong>

<span id="displayPort"></span>

</p>

<p>

<strong>Unit:</strong>

<span id="displayUnit"></span>

</p>

</div>

<button id="changeBtn">
CHANGE
</button>

<button id="addBtn">
ADD
</button>

<button id="hiatusBtn">
HIATUS
</button>

<button id="leaveBtn">
LEAVE
</button>

</div>

</section>

<!-- Request Form -->

<section id="form" class="screen">

<div class="container">

<h2 id="formTitle">

Request Form

</h2>

<div id="formFields">

<!-- Generated by JavaScript -->

</div>

<div class="button-group">

<button id="submitBtn">

SUBMIT

</button>

<button id="cancelBtn">

BACK

</button>

</div>

</div>

</section>

<!-- Success -->

<section id="success" class="screen">

<div class="container">

<h2>

REQUEST SUBMITTED

</h2>

<p>

Your request has been sent successfully.

</p>

<p>

Status:
<strong>

Pending Council Review

</strong>

</p>

<button id="menuReturn">

RETURN TO MENU

</button>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
